name: Build Iosevka Pro Fonts

on:
  push:
    branches: ["main"]
    paths:
      - "private-build-plans.toml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.plan }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        plan:
          - IosevkaProMono
          - IosevkaProSans
          - IosevkaProSerif

    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Checkout Iosevka source
        uses: actions/checkout@v4
        with:
          repository: be5invis/Iosevka
          ref: main
          path: Iosevka

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: Iosevka/package-lock.json

      - name: Install ttfautohint
        run: sudo apt-get install -y ttfautohint

      - name: Install Iosevka build dependencies
        working-directory: Iosevka
        run: npm ci

      - name: Copy build plan into Iosevka source
        run: cp private-build-plans.toml Iosevka/private-build-plans.toml

      - name: Build ${{ matrix.plan }} (TTF only)
        working-directory: Iosevka
        run: npm run build -- ttf::${{ matrix.plan }}

      - name: Upload ${{ matrix.plan }} artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.plan }}
          path: Iosevka/dist/${{ matrix.plan }}/TTF/
          if-no-files-found: error
          retention-days: 30
