name: Build Iosevka Pro Fonts

on:
  push:
    branches: ["main"]
    paths:
      - "private-build-plans.toml"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build-ttf:
    name: Build ${{ matrix.fontFamily }} (TTF)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        fontFamily:
          - IosevkaProMono
          - IosevkaProSans
          - IosevkaProSerif

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install ttfautohint
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ttfautohint

      - name: Checkout Customization Repository
        uses: actions/checkout@v4
        with:
          path: customization

      - name: Checkout Iosevka Repository
        uses: actions/checkout@v4
        with:
          repository: be5invis/Iosevka
          path: iosevka

      - name: Copy Custom Build Plans
        shell: bash
        run: |
          cp customization/private-build-plans.toml iosevka/private-build-plans.toml

      - name: Build ${{ matrix.fontFamily }}
        shell: bash
        working-directory: iosevka
        run: |
          npm ci
          npm run build -- ttf::${{ matrix.fontFamily }}

      - name: Upload Font Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.fontFamily }}-ttf
          path: iosevka/dist/${{ matrix.fontFamily }}/TTF/
          if-no-files-found: error
          retention-days: 30
